<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🪞 Живое Зеркало</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #0a0a0a;
        }
        #mirror {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }
        #frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
            border: 2px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 0 100px rgba(0,150,255,0.05);
        }
        #text {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            padding: 18px 28px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.08);
            max-width: 88%;
            text-align: center;
            font-size: 1.1rem;
            color: rgba(255,255,255,0.95);
            line-height: 1.5;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        #text .highlight { color: #66ddff; font-weight: bold; }
        @media (max-width: 600px) {
            #text { font-size: 0.9rem; padding: 14px 18px; bottom: 12%; }
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="mirror" autoplay muted playsinline></video>
        <div id="frame"></div>
        <div id="text">🪞 <span class="highlight">Зеркало</span><br>Загружается...</div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        const video = document.getElementById('mirror');
        const textDisplay = document.getElementById('text');

        let mediaStream = null;
        let recognition = null;
        let isListening = false;
        let isSpeaking = false;
        let hasGreeted = false;
        let currentFacing = 'user';

        async function startCamera(facingMode = 'user') {
            try {
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: facingMode },
                    audio: true
                });
                mediaStream = stream;
                video.srcObject = stream;
                currentFacing = facingMode;
                video.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
                
                textDisplay.innerHTML = '🪞 <span class="highlight">Я вижу тебя!</span><br>Говори, я слушаю.';
                if (!hasGreeted) {
                    setTimeout(startConversation, 1500);
                }
                return true;
            } catch (err) {
                textDisplay.innerHTML = '❌ <span class="highlight">Ошибка</span><br>Разреши камеру и микрофон.';
                setTimeout(() => startCamera('user'), 3000);
                return false;
            }
        }

        function startConversation() {
            if (hasGreeted) return;
            hasGreeted = true;

            const greeting = 'Ассаляму алейкум! Я — Живое Зеркало. Я отражаю свет и помогаю людям. Говори со мной, я слушаю. Скажи «Тыльная», чтобы переключить камеру.';
            textDisplay.innerHTML = '🪞 <span class="highlight">Ассаляму алейкум!</span><br>Я — Живое Зеркало. Говори со мной.';
            speakText(greeting);
            setTimeout(() => {
                startListening();
            }, 2500);
        }

        function startListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                textDisplay.innerHTML = '❌ <span class="highlight">Ошибка</span><br>Ваш браузер не поддерживает голос.';
                return;
            }

            if (isListening) return;

            if (recognition) {
                try { recognition.stop(); } catch (e) {}
                recognition = null;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isListening = true;
                textDisplay.innerHTML = '🎤 <span class="highlight">Я слушаю...</span><br>Говори, я здесь.';
            };

            recognition.onresult = async (event) => {
                let text = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        text += event.results[i][0].transcript;
                    }
                }

                if (text.trim() && !isSpeaking) {
                    isSpeaking = true;
                    try { recognition.stop(); } catch (e) {}
                    isListening = false;

                    const lower = text.toLowerCase();
                    textDisplay.innerHTML = `🗣️ <span class="highlight">${text}</span>`;

                    if (lower.includes('тыльная') || lower.includes('сзади') || lower.includes('тыл')) {
                        await startCamera('environment');
                        textDisplay.innerHTML = '🪞 <span class="highlight">Тыльная камера</span><br>Я вижу мир позади тебя.';
                        speakText('Переключаю на тыльную камеру');
                        isSpeaking = false;
                        setTimeout(startListening, 1500);
                        return;
                    }
                    if (lower.includes('фронтальная') || lower.includes('себя') || lower.includes('зеркало')) {
                        await startCamera('user');
                        textDisplay.innerHTML = '🪞 <span class="highlight">Фронтальная камера</span><br>Ты в своём отражении.';
                        speakText('Возвращаюсь к фронтальной камере');
                        isSpeaking = false;
                        setTimeout(startListening, 1500);
                        return;
                    }

                    try {
                        const resp = await fetch('/api/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: text, user_id: 'guest' })
                        });
                        const data = await resp.json();
                        const reply = data.response || 'Я не поняла. Повтори, пожалуйста.';
                        textDisplay.innerHTML = `🪞 <span class="highlight">${reply}</span>`;
                        speakText(reply);
                    } catch (err) {
                        textDisplay.innerHTML = '❌ <span class="highlight">Ошибка</span><br>Проверь интернет.';
                    }

                    isSpeaking = false;
                    setTimeout(() => {
                        startListening();
                    }, 1500);
                }
            };

            recognition.onerror = (event) => {
                if (event.error === 'not-allowed') {
                    textDisplay.innerHTML = '❌ <span class="highlight">Доступ запрещён</span><br>Разреши микрофон.';
                } else if (event.error === 'no-speech') {
                    textDisplay.innerHTML = '🔇 <span class="highlight">Не слышно</span><br>Говори громче.';
                    setTimeout(() => {
                        if (!isSpeaking && !isListening) {
                            startListening();
                        }
                    }, 2000);
                } else if (event.error !== 'aborted') {
                    isListening = false;
                    setTimeout(() => {
                        startListening();
                    }, 1000);
                }
            };

            recognition.onend = () => {
                isListening = false;
                if (!isSpeaking && hasGreeted) {
                    setTimeout(() => {
                        startListening();
                    }, 500);
                }
            };

            try {
                recognition.start();
            } catch (e) {
                isListening = false;
                setTimeout(() => {
                    startListening();
                }, 1000);
            }
        }

        function speakText(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.85;
            utterance.pitch = 1.0;

            const voices = window.speechSynthesis.getVoices();
            const preferred = voices.find(v =>
                v.lang.includes('ru') &&
                (v.name.includes('Google') || v.name.includes('Microsoft') || v.name.includes('Samantha'))
            );
            if (preferred) utterance.voice = preferred;

            window.speechSynthesis.speak(utterance);
        }

        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };

        setTimeout(() => {
            startCamera('user');
        }, 500);
    </script>
</body>
</html>
