<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🪞 Зеркало</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #0a0a0a;
        }
        #mirror {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }
        #frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
            border: 2px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 0 100px rgba(0,150,255,0.03);
        }
        #text {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 85%;
            text-align: center;
            font-size: 1.1rem;
            color: rgba(255,255,255,0.9);
            line-height: 1.6;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #text .highlight { color: #00ccff; font-weight: bold; }
        @media (max-width: 600px) {
            #text { font-size: 0.95rem; padding: 15px 20px; bottom: 15%; }
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="mirror" autoplay muted playsinline></video>
        <div id="frame"></div>
        <div id="text">🪞 <span class="highlight">Зеркало</span><br>Загружается...</div>
    </div>
    <script>
        // ===================================================
        // 1. ЗАПУСК КАМЕРЫ (РАБОТАЕТ ВЕЗДЕ)
        // ===================================================
        const video = document.getElementById('mirror');
        const textDisplay = document.getElementById('text');

        // Функция для повторного запроса разрешений
        async function requestPermissions() {
            try {
                // Запрашиваем доступ к камере и микрофону
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' },
                    audio: true
                });
                return stream;
            } catch (err) {
                console.log('Ошибка доступа:', err);
                return null;
            }
        }

        async function startMirror() {
            // Пробуем получить доступ
            let stream = await requestPermissions();
            
            // Если первый раз не получилось — пробуем ещё раз через 1 секунду
            if (!stream) {
                textDisplay.innerHTML = '🪞 <span class="highlight">Зеркало</span><br>Разреши доступ к камере и микрофону.';
                setTimeout(async () => {
                    stream = await requestPermissions();
                    if (stream) {
                        video.srcObject = stream;
                        textDisplay.innerHTML = '🪞 <span class="highlight">Зеркало</span><br>Я вижу тебя!';
                        setTimeout(startConversation, 1500);
                    } else {
                        textDisplay.innerHTML = '❌ <span class="highlight">Доступ запрещён</span><br>Разреши камеру и микрофон в настройках браузера.';
                    }
                }, 2000);
                return;
            }

            // Если доступ получен
            video.srcObject = stream;
            textDisplay.innerHTML = '🪞 <span class="highlight">Зеркало</span><br>Я вижу тебя!';
            setTimeout(startConversation, 1500);
        }

        // ===================================================
        // 2. НАЧАЛО РАЗГОВОРА
        // ===================================================
        let hasGreeted = false;

        function startConversation() {
            if (hasGreeted) return;
            hasGreeted = true;

            const greeting = 'Ассаляму алейкум! Я — Зеркало. Я отражаю свет и помогаю людям. Говори со мной, я слушаю.';
            textDisplay.innerHTML = '🪞 <span class="highlight">Ассаляму алейкум!</span><br>Я — Зеркало. Говори со мной.';
            speakText(greeting);

            // Запускаем распознавание речи через 2 секунды
            setTimeout(startVoiceRecognition, 2000);
        }

        // ===================================================
        // 3. ГОЛОСОВОЙ ВВОД (УНИВЕРСАЛЬНЫЙ)
        // ===================================================
        let recognition = null;
        let isListening = false;

        function startVoiceRecognition() {
            // Проверяем, поддерживается ли распознавание речи
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                textDisplay.innerHTML = '❌ <span class="highlight">Ошибка</span><br>Ваш браузер не поддерживает голос. Попробуйте Chrome.';
                return;
            }

            if (isListening) return;

            try {
                recognition = new SpeechRecognition();
                recognition.lang = 'ru-RU';
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.maxAlternatives = 1;

                recognition.onresult = async (event) => {
                    let text = '';
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        if (event.results[i].isFinal) {
                            text += event.results[i][0].transcript;
                        }
                    }

                    if (text.trim()) {
                        textDisplay.innerHTML = `🗣️ <span class="highlight">${text}</span>`;
                        try {
                            const response = await fetch('/api/chat', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ message: text })
                            });
                            const data = await response.json();
                            const reply = data.response || 'Я не поняла. Повтори, пожалуйста.';
                            textDisplay.innerHTML = `🪞 <span class="highlight">${reply}</span>`;
                            speakText(reply);
                        } catch (err) {
                            textDisplay.innerHTML = '❌ <span class="highlight">Ошибка</span><br>Проверь интернет.';
                        }
                    }
                };

                recognition.onerror = (event) => {
                    console.log('Ошибка:', event.error);
                    if (event.error === 'not-allowed') {
                        textDisplay.innerHTML = '❌ <span class="highlight">Доступ запрещён</span><br>Разреши микрофон в настройках браузера.';
                    } else if (event.error === 'no-speech') {
                        textDisplay.innerHTML = '🔇 <span class="highlight">Не слышно</span><br>Говори громче.';
                        setTimeout(() => {
                            if (hasGreeted) {
                                textDisplay.innerHTML = '🎤 <span class="highlight">Я слушаю...</span><br>Говори, я здесь.';
                            }
                        }, 2000);
                    } else {
                        // При других ошибках перезапускаем
                        setTimeout(startVoiceRecognition, 1000);
                    }
                };

                recognition.onend = () => {
                    isListening = false;
                    if (hasGreeted) {
                        setTimeout(startVoiceRecognition, 1000);
                    }
                };

                recognition.start();
                isListening = true;
                textDisplay.innerHTML = '🎤 <span class="highlight">Я слушаю...</span><br>Говори, я здесь.';
            } catch (e) {
                console.log('Ошибка старта:', e);
                setTimeout(startVoiceRecognition, 2000);
            }
        }

        // ===================================================
        // 4. СИНТЕЗ РЕЧИ (УНИВЕРСАЛЬНЫЙ)
        // ===================================================
        function speakText(text) {
            if (!window.speechSynthesis) return;

            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.9;
            utterance.pitch = 1.1;
            utterance.volume = 1;

            // Пытаемся выбрать женский голос
            const voices = window.speechSynthesis.getVoices();
            const female = voices.find(v => v.lang.includes('ru') && (v.name.includes('Google') || v.name.includes('Microsoft') || v.name.includes('Samantha')));
            if (female) utterance.voice = female;

            window.speechSynthesis.speak(utterance);
        }

        // Загружаем голоса
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };

        // ===================================================
        // 5. ЗАПУСК
        // ===================================================
        startMirror();
    </script>
</body>
</html>
