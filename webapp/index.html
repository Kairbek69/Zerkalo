<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪞 Зеркало</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            position: absolute;
            top: 0;
            left: 0;
        }
        #text {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 16px 24px;
            border-radius: 20px;
            font-size: 18px;
            text-align: center;
            max-width: 90%;
            z-index: 10;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        #status {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            padding: 6px 16px;
            border-radius: 12px;
            font-size: 12px;
            color: #66ddff;
            z-index: 10;
        }
        #log {
            position: absolute;
            bottom: 160px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 14px;
            text-align: center;
            max-width: 90%;
            z-index: 10;
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <video id="mirror" autoplay muted playsinline></video>
    <div id="status">🟢 Зеркало активно</div>
    <div id="log">Готов к разговору</div>
    <div id="text">🪞 Живое Зеркало<br><small>Говори что-нибудь...</small></div>

    <script>
        const video = document.getElementById('mirror');
        const textDisplay = document.getElementById('text');
        const statusDisplay = document.getElementById('status');
        const logDisplay = document.getElementById('log');

        let recognition = null;
        let isListening = false;

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' },
                    audio: true
                });
                video.srcObject = stream;
                logDisplay.innerHTML = '✅ Камера и микрофон работают';
                startListening();
            } catch (err) {
                logDisplay.innerHTML = '❌ Ошибка: ' + err.message;
                textDisplay.innerHTML = '❌ Разреши камеру и микрофон';
                setTimeout(startCamera, 3000);
            }
        }

        function startListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                logDisplay.innerHTML = '❌ Браузер не поддерживает голос';
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isListening = true;
                statusDisplay.innerHTML = '🎤 Слушаю...';
                logDisplay.innerHTML = 'Говори, я здесь';
                textDisplay.innerHTML = '🎤 Слушаю...<br><small>Говори, я здесь</small>';
            };

            recognition.onresult = async (event) => {
                let spoken = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        spoken += event.results[i][0].transcript;
                    }
                }
                if (spoken.trim()) {
                    logDisplay.innerHTML = '🗣️ Ты сказал: ' + spoken;
                    textDisplay.innerHTML = '🗣️ ' + spoken;
                    statusDisplay.innerHTML = '📤 Отправляю...';
                    await sendToServer(spoken);
                }
            };

            recognition.onerror = (event) => {
                logDisplay.innerHTML = '❌ Ошибка: ' + event.error;
                if (event.error === 'not-allowed') {
                    logDisplay.innerHTML = '❌ Разреши микрофон в браузере';
                }
                isListening = false;
                setTimeout(startListening, 1000);
            };

            recognition.onend = () => {
                isListening = false;
                if (!isListening) {
                    setTimeout(startListening, 500);
                }
            };

            try {
                recognition.start();
            } catch (e) {
                logDisplay.innerHTML = '❌ Ошибка старта: ' + e.message;
                setTimeout(startListening, 2000);
            }
        }

        async function sendToServer(text) {
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: text,
                        user_id: 'guest'
                    })
                });

                const data = await response.json();
                const reply = data.response || 'Я не поняла. Повтори.';

                textDisplay.innerHTML = '🪞 ' + reply;
                logDisplay.innerHTML = '🪞 ' + reply;
                statusDisplay.innerHTML = '✅ Ответ получен';
                speakText(reply);
            } catch (err) {
                logDisplay.innerHTML = '❌ Ошибка сети: ' + err.message;
                statusDisplay.innerHTML = '❌ Ошибка';
                textDisplay.innerHTML = '❌ Проверь интернет';
            }
        }

        function speakText(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.9;
            utterance.pitch = 1.1;
            window.speechSynthesis.speak(utterance);
        }

        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };

        startCamera();
    </script>
</body>
</html>
