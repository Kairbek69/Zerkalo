<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🪞 Живое Зеркало</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #0a0a0a;
        }
        #mirror {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }
        #waveCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            opacity: 0.35;
            mix-blend-mode: overlay;
        }
        #frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.7) 100%);
            border: 2px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 150px rgba(0, 150, 255, 0.05);
        }
        #text {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            padding: 18px 28px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 88%;
            text-align: center;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.95);
            line-height: 1.5;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        #text .highlight { color: #66ddff; font-weight: bold; }
        @media (max-width: 600px) {
            #text { font-size: 0.9rem; padding: 14px 18px; bottom: 12%; }
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="mirror" autoplay muted playsinline></video>
        <canvas id="waveCanvas"></canvas>
        <div id="frame"></div>
        <div id="text">🪞 <span class="highlight">Живое Зеркало</span><br>Загружается...</div>
    </div>

    <script>
        // ===================================================
        // 1. КАМЕРА
        // ===================================================
        const video = document.getElementById('mirror');
        const textDisplay = document.getElementById('text');

        let mediaStream = null;
        let hasStarted = false;
        let recognition = null;
        let isListening = false;

        async function startMirror() {
            try {
                // Запрашиваем камеру и микрофон одновременно
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' },
                    audio: true
                });
                video.srcObject = mediaStream;
                textDisplay.innerHTML = '🪞 <span class="highlight">Живое Зеркало</span><br>Я вижу тебя...';
                setTimeout(() => {
                    startConversation();
                }, 1500);
            } catch (err) {
                textDisplay.innerHTML = '❌ <span class="highlight">Ошибка</span><br>Разреши камеру и микрофон.';
                // Повторяем запрос каждые 3 секунды, пока не разрешат
                setTimeout(startMirror, 3000);
            }
        }

        // ===================================================
        // 2. ПРИНУДИТЕЛЬНЫЙ ЗАПРОС МИКРОФОНА (решает проблему)
        // ===================================================
        async function ensureMicrophone() {
            // Если микрофон уже есть, ничего не делаем
            if (mediaStream && mediaStream.active) return;

            try {
                // Запрашиваем ТОЛЬКО микрофон (это заставит браузер показать окно разрешения)
                const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // Добавляем аудио-трек к существующему потоку
                if (mediaStream) {
                    audioStream.getTracks().forEach(track => {
                        mediaStream.addTrack(track);
                    });
                } else {
                    mediaStream = audioStream;
                }
                textDisplay.innerHTML = '🎤 <span class="highlight">Микрофон включён</span><br>Я слушаю тебя...';
            } catch (err) {
                textDisplay.innerHTML = '❌ <span class="highlight">Ошибка</span><br>Разреши микрофон.';
                throw err;
            }
        }

        // ===================================================
        // 3. НАЧАЛО РАЗГОВОРА
        // ===================================================
        function startConversation() {
            if (hasStarted) return;
            hasStarted = true;

            const greeting = 'Ассаляму алейкум! Я — Живое Зеркало. Я слушаю тебя. Говори, я здесь.';
            textDisplay.innerHTML = '🪞 <span class="highlight">Ассаляму алейкум!</span><br>Я — Живое Зеркало. Говори со мной.';
            speakText(greeting);
            setTimeout(() => {
                startListening();
            }, 2000);
        }

        // ===================================================
        // 4. СЛУШАЕМ И ОТВЕЧАЕМ
        // ===================================================
        async function startListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                textDisplay.innerHTML = '❌ <span class="highlight">Ошибка</span><br>Ваш браузер не поддерживает голос.';
                return;
            }

            // ПРИНУДИТЕЛЬНО ЗАПРАШИВАЕМ МИКРОФОН
            try {
                await ensureMicrophone();
            } catch (e) {
                setTimeout(startListening, 3000);
                return;
            }

            if (isListening) return;

            if (recognition) {
                try { recognition.stop(); } catch (e) {}
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isListening = true;
                textDisplay.innerHTML = '🎤 <span class="highlight">Я слушаю...</span><br>Говори, я здесь.';
            };

            recognition.onresult = async (event) => {
                let spoken = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        spoken += event.results[i][0].transcript;
                    }
                }

                if (spoken.trim()) {
                    textDisplay.innerHTML = `🗣️ <span class="highlight">${spoken}</span>`;
                    try {
                        const response = await fetch('/api/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: spoken, user_id: 'guest' })
                        });
                        const data = await response.json();
                        const reply = data.response || 'Я не поняла. Повтори, пожалуйста.';
                        textDisplay.innerHTML = `🪞 <span class="highlight">${reply}</span>`;
                        speakText(reply);
                    } catch (err) {
                        textDisplay.innerHTML = '❌ <span class="highlight">Ошибка</span><br>Проверь интернет.';
                    }
                }
            };

            recognition.onerror = (event) => {
                console.log('Ошибка:', event.error);
                if (event.error === 'not-allowed') {
                    textDisplay.innerHTML = '❌ <span class="highlight">Доступ запрещён</span><br>Разреши микрофон.';
                } else if (event.error === 'no-speech') {
                    textDisplay.innerHTML = '🔇 <span class="highlight">Не слышно</span><br>Говори громче.';
                }
                isListening = false;
            };

            recognition.onend = () => {
                isListening = false;
                if (hasStarted) {
                    setTimeout(startListening, 1000);
                }
            };

            try {
                recognition.start();
            } catch (e) {
                console.log('Ошибка старта:', e);
                isListening = false;
                setTimeout(startListening, 2000);
            }
        }

        // ===================================================
        // 5. ВОЛНЫ (ВИБРАЦИЯ)
        // ===================================================
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        let w, h;

        function resizeCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const waves = [];
        for (let i = 0; i < 5; i++) {
            waves.push({
                amp: 8 + Math.random() * 12,
                freq: 0.002 + Math.random() * 0.003,
                speed: 0.008 + Math.random() * 0.008,
                phase: Math.random() * Math.PI * 2,
                color: `hsla(${190 + Math.random() * 30}, 80%, 60%, 0.12)`
            });
        }

        function drawWaves() {
            ctx.clearRect(0, 0, w, h);
            for (let y = 0; y < h; y += 2) {
                let offset = 0;
                for (const wave of waves) {
                    offset += wave.amp * Math.sin(y * wave.freq + Date.now() * wave.speed + wave.phase);
                }
                const x = w / 2 + offset * 0.6;
                const grad = ctx.createRadialGradient(x, y, 0, x, y, 80);
                grad.addColorStop(0, `rgba(100, 220, 255, 0.07)`);
                grad.addColorStop(1, `rgba(100, 220, 255, 0)`);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.ellipse(x, y, 60 + offset * 0.3, 4, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            for (let i = 0; i < 6; i++) {
                const x = (Math.sin(Date.now() * 0.0004 + i * 1.2) + 1) * w / 2;
                const y = (Math.cos(Date.now() * 0.0006 + i * 0.9) + 1) * h / 2;
                const grad = ctx.createRadialGradient(x, y, 0, x, y, 120);
                grad.addColorStop(0, `rgba(100, 200, 255, 0.04)`);
                grad.addColorStop(1, `rgba(100, 200, 255, 0)`);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);
            }
            requestAnimationFrame(drawWaves);
        }
        drawWaves();

        // ===================================================
        // 6. ГОЛОС ЗЕРКАЛА
        // ===================================================
        function speakText(text) {
            if (!window.speechSynthesis) return;

            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.85;
            utterance.pitch = 1.0;

            const voices = window.speechSynthesis.getVoices();
            const preferred = voices.find(v =>
                v.lang.includes('ru') &&
                (v.name.includes('Google') || v.name.includes('Microsoft') || v.name.includes('Samantha'))
            );
            if (preferred) utterance.voice = preferred;

            window.speechSynthesis.speak(utterance);
        }

        // ===================================================
        // 7. ЗАГРУЗКА ГОЛОСОВ
        // ===================================================
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };

        // ===================================================
        // 8. ЗАПУСК
        // ===================================================
        startMirror();
    </script>
</body>
</html>
