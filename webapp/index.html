<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🪞 Зеркало</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #0a0a0a;
        }
        #mirror {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }
        #frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
            border: 2px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 0 100px rgba(0,150,255,0.03);
        }
        #text {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 85%;
            text-align: center;
            font-size: 1.1rem;
            color: rgba(255,255,255,0.9);
            line-height: 1.6;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #text .highlight { color: #00ccff; font-weight: bold; }
        @media (max-width: 600px) {
            #text { font-size: 0.95rem; padding: 15px 20px; bottom: 15%; }
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="mirror" autoplay muted playsinline></video>
        <div id="frame"></div>
        <div id="text">🪞 <span class="highlight">Зеркало</span><br>Загружается...</div>
    </div>
    <script>
        // ===================================================
        // 1. ЗАПУСК КАМЕРЫ И МИКРОФОНА
        // ===================================================
        const video = document.getElementById('mirror');
        const textDisplay = document.getElementById('text');

        let hasStarted = false;
        let recognition = null;

        async function startMirror() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' },
                    audio: true
                });
                video.srcObject = stream;
                textDisplay.innerHTML = '🪞 <span class="highlight">Зеркало</span><br>Я вижу тебя!';
                setTimeout(startConversation, 1500);
            } catch (err) {
                textDisplay.innerHTML = '❌ <span class="highlight">Ошибка</span><br>Разреши камеру и микрофон.';
                setTimeout(startMirror, 3000);
            }
        }

        startMirror();

        // ===================================================
        // 2. ПРИВЕТСТВИЕ
        // ===================================================
        function startConversation() {
            if (hasStarted) return;
            hasStarted = true;

            const greeting = 'Ассаляму алейкум! Я — Зеркало. Говори со мной, я слушаю.';
            textDisplay.innerHTML = '🪞 <span class="highlight">Ассаляму алейкум!</span><br>Я — Зеркало. Говори со мной.';
            speakText(greeting);
            setTimeout(startListening, 2000);
        }

        // ===================================================
        // 3. СЛУШАЕМ И ОТПРАВЛЯЕМ НА СЕРВЕР
        // ===================================================
        function startListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                textDisplay.innerHTML = '❌ <span class="highlight">Ошибка</span><br>Ваш браузер не поддерживает голос.';
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = async (event) => {
                let spoken = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        spoken += event.results[i][0].transcript;
                    }
                }

                if (spoken.trim()) {
                    textDisplay.innerHTML = `🗣️ <span class="highlight">${spoken}</span>`;
                    
                    try {
                        const response = await fetch('/api/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: spoken, user_id: 'guest' })
                        });

                        const data = await response.json();
                        const reply = data.response || 'Я не поняла. Повтори, пожалуйста.';
                        textDisplay.innerHTML = `🪞 <span class="highlight">${reply}</span>`;
                        speakText(reply);
                    } catch (err) {
                        textDisplay.innerHTML = '❌ <span class="highlight">Ошибка</span><br>Проверь интернет.';
                    }
                }
            };

            recognition.onerror = (event) => {
                if (event.error === 'not-allowed') {
                    textDisplay.innerHTML = '❌ <span class="highlight">Доступ запрещён</span><br>Разреши микрофон.';
                } else if (event.error === 'no-speech') {
                    textDisplay.innerHTML = '🔇 <span class="highlight">Не слышно</span><br>Говори громче.';
                }
            };

            recognition.onend = () => {
                if (hasStarted) {
                    setTimeout(startListening, 1000);
                }
            };

            recognition.start();
            textDisplay.innerHTML = '🎤 <span class="highlight">Я слушаю...</span><br>Говори, я здесь.';
        }

        // ===================================================
        // 4. ГОЛОС ЗЕРКАЛА
        // ===================================================
        function speakText(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.9;
            utterance.pitch = 1.1;

            const voices = window.speechSynthesis.getVoices();
            const female = voices.find(v => v.lang.includes('ru') && (v.name.includes('Google') || v.name.includes('Microsoft')));
            if (female) utterance.voice = female;

            window.speechSynthesis.speak(utterance);
        }

        // ===================================================
        // 5. ЗАГРУЗКА ГОЛОСОВ
        // ===================================================
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };
    </script>
</body>
</html>
