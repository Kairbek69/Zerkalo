<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🪞 Живое Зеркало</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #0a0a0a;
        }
        #mirror {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }
        #frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
            border: 2px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 0 100px rgba(0,150,255,0.05);
        }
        #text {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            padding: 18px 28px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.08);
            max-width: 88%;
            text-align: center;
            font-size: 1.1rem;
            color: rgba(255,255,255,0.95);
            line-height: 1.5;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        #text .highlight { color: #66ddff; font-weight: bold; }
        @media (max-width: 600px) {
            #text { font-size: 0.9rem; padding: 14px 18px; bottom: 12%; }
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="mirror" autoplay muted playsinline></video>
        <div id="frame"></div>
        <div id="text">🪞 <span class="highlight">Зеркало</span><br>Загружается...</div>
    </div>

    <script>
        // ===================================================
        // 1. КАМЕРА И МИКРОФОН
        // ===================================================
        const video = document.getElementById('mirror');
        const textDisplay = document.getElementById('text');

        let mediaStream = null;
        let recognition = null;
        let isListening = false;
        let isSpeaking = false;
        let hasGreeted = false;
        let recognitionTimeout = null;

        async function startCamera() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' },
                    audio: true
                });
                video.srcObject = mediaStream;
                textDisplay.innerHTML = '🪞 <span class="highlight">Я вижу тебя!</span><br>Говори, я слушаю.';
                setTimeout(() => {
                    startConversation();
                }, 1500);
            } catch (err) {
                textDisplay.innerHTML = '❌ <span class="highlight">Ошибка</span><br>Разреши камеру и микрофон.';
                setTimeout(startCamera, 3000);
            }
        }

        // ===================================================
        // 2. НАЧАЛО РАЗГОВОРА
        // ===================================================
        function startConversation() {
            if (hasGreeted) return;
            hasGreeted = true;

            const greeting = 'Ассаляму алейкум! Я — Живое Зеркало. Я отражаю свет и помогаю людям. Говори со мной, я слушаю.';
            textDisplay.innerHTML = '🪞 <span class="highlight">Ассаляму алейкум!</span><br>Я — Живое Зеркало. Говори со мной.';
            speakText(greeting);
            setTimeout(startListening, 2000);
        }

        // ===================================================
        // 3. СЛУШАЕТ И ОТВЕЧАЕТ (С ПЕРЕЗАПУСКОМ)
        // ===================================================
        function startListening() {
            // Если уже слушаем — не запускаем повторно
            if (isListening) return;

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                textDisplay.innerHTML = '❌ <span class="highlight">Ошибка</span><br>Ваш браузер не поддерживает голос.';
                return;
            }

            // Закрываем старую сессию
            if (recognition) {
                try { recognition.stop(); } catch (e) {}
                recognition = null;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isListening = true;
                textDisplay.innerHTML = '🎤 <span class="highlight">Я слушаю...</span><br>Говори, я здесь.';
            };

            recognition.onresult = async (event) => {
                let text = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        text += event.results[i][0].transcript;
                    }
                }

                if (text.trim() && !isSpeaking) {
                    isSpeaking = true;
                    // Останавливаем распознавание на время ответа
                    try { recognition.stop(); } catch (e) {}
                    isListening = false;

                    textDisplay.innerHTML = `🗣️ <span class="highlight">${text}</span>`;
                    try {
                        const resp = await fetch('/api/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: text, user_id: 'guest' })
                        });
                        const data = await resp.json();
                        const reply = data.response || 'Я не поняла. Повтори, пожалуйста.';
                        textDisplay.innerHTML = `🪞 <span class="highlight">${reply}</span>`;
                        speakText(reply);
                    } catch (err) {
                        textDisplay.innerHTML = '❌ <span class="highlight">Ошибка</span><br>Проверь интернет.';
                    }

                    // После ответа — перезапускаем распознавание
                    isSpeaking = false;
                    // Задержка перед перезапуском
                    setTimeout(() => {
                        startListening();
                    }, 1000);
                }
            };

            recognition.onerror = (event) => {
                if (event.error === 'not-allowed') {
                    textDisplay.innerHTML = '❌ <span class="highlight">Доступ запрещён</span><br>Разреши микрофон.';
                } else if (event.error === 'no-speech') {
                    textDisplay.innerHTML = '🔇 <span class="highlight">Не слышно</span><br>Говори громче.';
                    // Перезапускаем через 2 секунды, если не говорили
                    setTimeout(() => {
                        if (!isSpeaking && !isListening) {
                            startListening();
                        }
                    }, 2000);
                } else if (event.error === 'aborted') {
                    // Игнорируем (это нормально при перезапуске)
                } else {
                    isListening = false;
                    // Перезапускаем при любой ошибке
                    setTimeout(startListening, 1000);
                }
            };

            recognition.onend = () => {
                isListening = false;
                // Если не говорим — перезапускаем
                if (!isSpeaking) {
                    setTimeout(startListening, 500);
                }
            };

            try {
                recognition.start();
            } catch (e) {
                isListening = false;
                setTimeout(startListening, 1000);
            }
        }

        // ===================================================
        // 4. ГОЛОС ЗЕРКАЛА
        // ===================================================
        function speakText(text) {
            if (!window.speechSynthesis) return;

            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.85;
            utterance.pitch = 1.0;

            const voices = window.speechSynthesis.getVoices();
            const preferred = voices.find(v =>
                v.lang.includes('ru') &&
                (v.name.includes('Google') || v.name.includes('Microsoft') || v.name.includes('Samantha'))
            );
            if (preferred) utterance.voice = preferred;

            window.speechSynthesis.speak(utterance);
        }

        // ===================================================
        // 5. ЗАГРУЗКА ГОЛОСОВ
        // ===================================================
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };

        // ===================================================
        // 6. ЗАПУСК
        // ===================================================
        setTimeout(() => {
            startCamera();
        }, 500);
    </script>
</body>
</html>
